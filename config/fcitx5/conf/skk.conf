# Rule
Rule=custom
# Punctuation Style
PunctuationStyle=Japanese
# Initial Input Mode
InitialInputMode=Latin
# Page size
PageSize=7
# Candidate Layout
Candidate Layout=Vertical
# Return-key does not insert new line on commit
EggLikeNewLine=False
# Show Annotation
ShowAnnotation=True
# Candidate Key
CandidateChooseKey="ABC (a,b,c,...)"
# Number candidate of Triggers To Show Candidate Window
NTriggersToShowCandWin=4

[CandidatesPageUpKey]
0=Page_Up

[CandidatesPageDownKey]
0=Next

[CursorUp]
0=Up

[CursorDown]
0=Down

